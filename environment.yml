name: srnj
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python packages
  - python=3.10
  - anndata=0.11.3
  - dendropy=5.0.1
  - networkx=3.4.2
  - numpy=2.2.2
  - scipy=1.15.1
  - scikit-bio=0.6.3
  - pandas
  - matplotlib
  - seaborn
  - numba
  - tqdm
  - scikit-learn
  - pip
  - fastme  # phylogenetic tree reconstruction

  - pip:
    - scgenome
    - CNASim==1.3.5

# External binary dependencies (install manually):
#   - tqDist: quartet_dist, triplet_dist from https://www.birc.au.dk/~cstorm/software/tqdist/
#   - booster: booster_linux64 from https://github.com/evolbioinfo/booster  
#   - SCONCE2 (optional): run ./scripts/setup_sconce2.sh
#
# After installation, verify with: ./scripts/check_deps.sh
