name: srnj-r
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python packages
  - python=3.10
  - anndata=0.11.3
  - dendropy=5.0.1
  - networkx=3.4.2
  - numpy=2.2.2
  - scipy=1.15.1
  - scikit-bio=0.6.3
  - pandas
  - matplotlib
  - seaborn
  - numba
  - tqdm
  - scikit-learn
  - pip
  - fastme  # phylogenetic tree reconstruction
  
  # R packages for scripts
  - r-base
  - r-ggplot2
  - r-tidyr
  - r-ggpubr
  - r-dplyr
  
  - pip:
    - scgenome

# Note: External binaries must be installed manually:
#   - tqDist: quartet_dist, triplet_dist  
#   - booster: booster_linux64
#   - SCONCE2
# See project README.md for installation instructions