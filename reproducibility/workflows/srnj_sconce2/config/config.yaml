# SCONCE2 paths (defaults to external/sconce2/ in project root if not specified)
# Uncomment and modify these lines if you have SCONCE2 installed elsewhere:
SCONCE2_EXEC: "/home/x_vitza/software/sconce2/sconce2"
SCONCE2_SCRIPTS: "/home/x_vitza/software/sconce2/scripts"

RESULTS_DIR: "results"
REPEATS: 20
N_CELLS: [20, 50, 100]
SCONCE2_K: 7
SEQ_ERROR: [0.02, 0.04]
# Sequencing coverage passed to CNAsim --coverage. Default CNAsim value is 0.1;
# lower values make HMMcopy more realistic (less signal) but slow SCONCE2 less.
COVERAGE: 0.02

# CN source fed into MEDICC2: "hmmcopy" (default) or "sconce2"
# Switch by editing this line, or override on the command line:
#   snakemake --config CN_SOURCE=sconce2
CN_SOURCE: "hmmcopy"

